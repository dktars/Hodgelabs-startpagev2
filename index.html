<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Startpage</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-glow bg-glow-a"></div>
  <div class="bg-glow bg-glow-b"></div>

  <main class="app">
    <header class="hero">
      <p class="eyebrow">Startpage</p>
      <h1 id="greeting" class="greeting">Good Afternoon</h1>
      <div id="time" class="time">5:48 PM</div>
      <div id="date" class="date">Sunday, April 19</div>
    </header>

    <form id="searchForm" class="search-bar">
      <select id="searchEngine" class="search-engine" aria-label="Search engine"></select>
      <input
        id="searchInput"
        class="search-input"
        type="text"
        placeholder="Search..."
        autocomplete="off"
      />
      <button type="submit" class="search-button">Search</button>
    </form>

    <section id="cardsGrid" class="cards-grid"></section>
  </main>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
